server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Allow PDF uploads up to 50 MB for the RAG knowledge base
    client_max_body_size 50M;

    # MCP protocol — SSE streaming, no buffering
    # Timeout set to 300s to handle long-running AWS scans and Terraform operations
    location /mcp {
        proxy_pass http://backend:8000/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Auto-generated REST test endpoints (Swagger-documented)
    # Timeout set to 300s — Terraform plan/apply can take minutes
    location /tools/ {
        proxy_pass http://backend:8000/tools/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # RAG document upload (multipart) and any future /rag/ REST routes
    location /rag/ {
        proxy_pass http://backend:8000/rag/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Private key file downloads from Terraform apply
    location /terraform/ {
        proxy_pass http://backend:8000/terraform/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # Swagger UI and OpenAPI schema
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Health check passthrough
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # React SPA — serve index.html for any unknown route (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
