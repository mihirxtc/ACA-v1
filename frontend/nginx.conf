server {
    listen 80;

    # Serve Vite static build
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all MCP traffic to the backend container
    location /mcp {
        proxy_pass http://backend:8000/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Required for SSE streaming (MCP uses Server-Sent Events)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # Proxy RAG file upload endpoint
    location /rag/ {
        proxy_pass http://backend:8000/rag/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        client_max_body_size 50M;
    }

    # React SPA — serve index.html for any unknown route (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
