server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # MCP protocol — SSE streaming, no buffering
    location /mcp {
        proxy_pass http://backend:8000/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # Auto-generated REST test endpoints (Swagger-documented)
    location /tools/ {
        proxy_pass http://backend:8000/tools/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Private key file downloads from Terraform apply
    location /terraform/ {
        proxy_pass http://backend:8000/terraform/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Swagger UI and OpenAPI schema
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Health check passthrough
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # React SPA — serve index.html for any unknown route (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
